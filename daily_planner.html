<div id="planner-root">
<style>
  #planner-root {
    --cream: #ede2cd;
    --cream-2: #e6d9be;
    --maroon: #7a2416;
    --maroon-2: #9c3820;
    --ink: #3a2317;
    --line: rgba(122,36,22,0.28);
    --gold: #b98a3d;
    --water: #3f7fa8;
    --water-light: #6fa8c9;
    font-family: 'Georgia', 'Iowan Old Style', serif;
    color: var(--ink);
    position: relative;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 34px 28px 30px;
    box-shadow: 0 10px 30px rgba(58,35,23,0.18);
  }

  #planner-root * { box-sizing: border-box; }

  /* ---------- Disco ball, contained inside the card's top-right ---------- */
  .disco-wrap {
    position: absolute;
    top: 6px;
    right: 20px;
    width: 74px;
    height: 100px;
    z-index: 5;
    pointer-events: none;
  }
  .disco-string {
    position: absolute;
    top: 0;
    left: 50%;
    width: 1px;
    height: 20px;
    background: linear-gradient(#00000000, var(--ink) 60%);
  }
  .disco-ball {
    position: absolute;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    width: 62px;
    height: 62px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    animation: discoSpin 9s linear infinite;
  }
  .disco-ball img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .disco-glint {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.85), transparent 40%);
    mix-blend-mode: screen;
    animation: discoGlint 2.6s ease-in-out infinite;
  }
  @keyframes discoSpin { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg); } }
  @keyframes discoGlint { 0%,100% { opacity: 0.35; } 50% { opacity: 0.9; } }

  /* ---------- Header ---------- */
  h1.title {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900;
    font-style: italic;
    font-size: 36px;
    color: var(--maroon);
    margin: 0 0 4px;
    max-width: 70%;
  }
  .subtitle { font-size: 12.5px; color: var(--maroon-2); font-weight: 700; letter-spacing: 0.5px; }

  .carry-banner {
    margin-top: 14px;
    background: #f4e9d6;
    border: 1px dashed var(--maroon);
    border-radius: 5px;
    padding: 9px 12px;
    font-size: 12.5px;
    color: var(--maroon-2);
    display: none;
  }
  .carry-banner.show { display: block; }

  hr.rule { border: none; border-top: 1px solid var(--line); margin: 18px 0; }

  /* ---------- Panels stacked full width ---------- */
  .panels { display: flex; flex-direction: column; gap: 18px; }
  .panel { border: 1px solid var(--line); border-radius: 6px; padding: 14px 16px 16px; background: rgba(255,255,255,0.15); }
  .panel h2 { margin: 0 0 10px; font-size: 15px; letter-spacing: 1px; color: var(--maroon); font-weight: 800; }

  .item-list { display: flex; flex-direction: column; gap: 7px; max-height: 260px; overflow-y: auto; padding-right: 2px; }
  .item-row { display: flex; align-items: center; gap: 9px; }
  .check {
    width: 18px; height: 18px; border: 1.5px solid var(--maroon); border-radius: 4px;
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--cream); font-size: 12px; background: transparent;
  }
  .check.done { background: var(--maroon); }
  .item-text { font-size: 14px; flex: 1; }
  .item-text.done { text-decoration: line-through; opacity: 0.5; }
  .carried-tag { font-size: 10px; color: var(--gold); border: 1px solid var(--gold); border-radius: 3px; padding: 1px 5px; flex-shrink: 0; }
  .del-btn { border: none; background: none; color: var(--maroon); opacity: 0.4; cursor: pointer; font-size: 14px; padding: 0 3px; }
  .del-btn:hover { opacity: 0.9; }

  .add-row { display: flex; gap: 6px; margin-top: 10px; }
  .add-row input { flex: 1; border: 1px solid var(--line); background: #fbf6ec; border-radius: 4px; padding: 7px 9px; font-family: inherit; font-size: 13.5px; outline: none; }
  .add-row button { border: none; background: var(--maroon); color: var(--cream); border-radius: 4px; padding: 7px 14px; font-size: 13.5px; cursor: pointer; font-weight: 700; }
  .add-row button:hover { background: var(--maroon-2); }

  /* ---------- Water tracker with pour animation ---------- */
  .water-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; justify-content: flex-start; padding-top: 6px; }
  .glass-slot { position: relative; width: 42px; height: 62px; cursor: pointer; }
  .drop-layer { position: absolute; top: -26px; left: 50%; transform: translateX(-50%); width: 10px; height: 26px; pointer-events: none; overflow: visible; }
  .drop {
    position: absolute; left: 50%; top: 0; width: 7px; height: 10px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    background: var(--water); transform: translateX(-50%) scale(1); opacity: 0;
  }
  .drop.falling { animation: dropFall 0.5s cubic-bezier(.55,0,1,.45) forwards; }
  @keyframes dropFall {
    0% { top: -4px; opacity: 1; transform: translateX(-50%) scale(1); }
    85% { opacity: 1; }
    100% { top: 30px; opacity: 0; transform: translateX(-50%) scale(0.6); }
  }

  .glass-svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .glass-outline { fill: none; stroke: var(--maroon); stroke-width: 1.6; }
  .water-fill { transition: transform 0.6s cubic-bezier(.4,1.4,.5,1); transform-box: fill-box; transform-origin: bottom; }
  .wave-path { animation: waveMove 1.8s linear infinite; }
  @keyframes waveMove { from { transform: translateX(0); } to { transform: translateX(-24px); } }

  .splash-ring {
    position: absolute; left: 50%; bottom: 8px; width: 30px; height: 10px; border: 2px solid var(--water-light);
    border-radius: 50%; opacity: 0; transform: translateX(-50%) scale(0.4); pointer-events: none;
  }
  .splash-ring.play { animation: splash 0.5s ease-out forwards; }
  @keyframes splash {
    0% { opacity: 0.9; transform: translateX(-50%) scale(0.3); }
    100% { opacity: 0; transform: translateX(-50%) scale(1.6); }
  }

  .water-summary { font-size: 12.5px; color: var(--maroon-2); margin-top: 12px; font-weight: 700; }

  .footer-mark { text-align: center; margin-top: 24px; font-weight: 800; color: var(--maroon); letter-spacing: 2px; font-size: 12px; }
</style>

<div class="disco-wrap">
  <div class="disco-string"></div>
  <div class="disco-ball">
    <img id="disco-img" src="" alt="disco ball" />
    <div class="disco-glint"></div>
  </div>
</div>

<h1 class="title">daily planner</h1>
<div class="subtitle" id="date-value"></div>

<div class="carry-banner" id="carry-banner"></div>

<hr class="rule"/>

<div class="panels">
  <div class="panel">
    <h2>TO DO</h2>
    <div class="item-list" id="todo-list"></div>
    <div class="add-row">
      <input id="todo-input" type="text" placeholder="Add a task…" />
      <button id="todo-add-btn">Add</button>
    </div>
  </div>

  <div class="panel">
    <h2>SHOPPING LIST</h2>
    <div class="item-list" id="shopping-list"></div>
    <div class="add-row">
      <input id="shopping-input" type="text" placeholder="Add an item…" />
      <button id="shopping-add-btn">Add</button>
    </div>
  </div>

  <div class="panel">
    <h2>WATER TRACKER</h2>
    <div class="water-row" id="water-row"></div>
    <div class="water-summary" id="water-summary"></div>
  </div>
</div>

<div class="footer-mark">summer</div>
</div>

  document.getElementById('disco-img').src = DISCO_SRC;

  const WATER_TARGET = 8;

  function todayKey(d) {
    d = d || new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  async function storeGet(key) {
    try {
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    } catch (e) { return null; }
  }
  async function storeSet(key, value) {
    try { await window.storage.set(key, JSON.stringify(value), false); } catch (e) { console.error(e); }
  }

  let state = {
    todos: [],
    shopping: [],
    water: { date: todayKey(), count: 0 },
    lastOpen: null
  };

  function uid() { return Math.random().toString(36).slice(2, 10); }

  async function loadState() {
    const [todos, shopping, water, lastOpen] = await Promise.all([
      storeGet('todos'), storeGet('shopping'), storeGet('water'), storeGet('lastOpen')
    ]);
    if (todos) state.todos = todos;
    if (shopping) state.shopping = shopping;
    if (water) state.water = water;
    if (lastOpen) state.lastOpen = lastOpen;
  }

  async function saveAll() {
    await Promise.all([
      storeSet('todos', state.todos),
      storeSet('shopping', state.shopping),
      storeSet('water', state.water),
      storeSet('lastOpen', state.lastOpen)
    ]);
  }

  // Runs whenever the calendar day changes (on load, or while left open
  // past midnight). Finished items clear out; pending ones carry into the
  // new day and get flagged so nothing is quietly lost. Water resets fresh.
  function rolloverIfNewDay() {
    const key = todayKey();
    if (state.lastOpen === key) return false;
    state.todos = state.todos.filter(t => !t.done);
    state.shopping = state.shopping.filter(s => !s.done);
    state.water = { date: key, count: 0 };
    state.lastOpen = key;
    return true;
  }

  function carriedCount() {
    const key = todayKey();
    const todoCarried = state.todos.filter(t => t.dateAdded !== key).length;
    const shopCarried = state.shopping.filter(s => s.dateAdded !== key).length;
    return { todoCarried, shopCarried };
  }

  function render() {
    const now = new Date();
    document.getElementById('date-value').textContent =
      now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    const { todoCarried, shopCarried } = carriedCount();
    const banner = document.getElementById('carry-banner');
    if (todoCarried || shopCarried) {
      const parts = [];
      if (todoCarried) parts.push(todoCarried + ' to-do' + (todoCarried > 1 ? 's' : '') + ' left from before');
      if (shopCarried) parts.push(shopCarried + ' shopping item' + (shopCarried > 1 ? 's' : '') + ' still to buy');
      banner.textContent = '⚠ Still pending: ' + parts.join(' · ');
      banner.classList.add('show');
    } else {
      banner.classList.remove('show');
    }

    renderItemList('todo-list', state.todos, 'todos');
    renderItemList('shopping-list', state.shopping, 'shopping');
    renderWater();
  }

  function renderItemList(elId, items, stateKey) {
    const el = document.getElementById(elId);
    el.innerHTML = '';
    const key = todayKey();
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';

      const check = document.createElement('button');
      check.className = 'check' + (item.done ? ' done' : '');
      check.textContent = item.done ? '✓' : '';
      check.onclick = async () => {
        item.done = !item.done;
        await storeSet(stateKey, state[stateKey]);
        render();
      };

      const text = document.createElement('span');
      text.className = 'item-text' + (item.done ? ' done' : '');
      text.textContent = item.text;

      row.appendChild(check);
      row.appendChild(text);

      if (item.dateAdded !== key) {
        const tag = document.createElement('span');
        tag.className = 'carried-tag';
        tag.textContent = 'carried';
        row.appendChild(tag);
      }

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.onclick = async () => {
        state[stateKey] = state[stateKey].filter(i => i.id !== item.id);
        await storeSet(stateKey, state[stateKey]);
        render();
      };
      row.appendChild(del);

      el.appendChild(row);
    });
  }

  // Builds one glass as an SVG with an animated, wavy water fill. The fill
  // height is driven by a CSS transform (scaleY) on the water group so it
  // rises smoothly, and a looping horizontal wave pattern gives it motion.
  function buildGlassSVG(filled) {
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 42 62');
    svg.setAttribute('class', 'glass-svg');

    const clipId = 'clip-' + Math.random().toString(36).slice(2, 8);
    const defs = document.createElementNS(ns, 'defs');
    const clipPath = document.createElementNS(ns, 'clipPath');
    clipPath.setAttribute('id', clipId);
    const clipShape = document.createElementNS(ns, 'path');
    clipShape.setAttribute('d', 'M6 4 L36 4 L31 58 L11 58 Z');
    clipPath.appendChild(clipShape);
    defs.appendChild(clipPath);
    svg.appendChild(defs);

    // Water group, clipped to the glass shape, scaled vertically to show level
    const waterGroup = document.createElementNS(ns, 'g');
    waterGroup.setAttribute('clip-path', 'url(#' + clipId + ')');
    waterGroup.setAttribute('class', 'water-fill');
    const scale = filled ? 1 : 0;
    waterGroup.style.transform = 'scaleY(' + scale + ')';

    const waterRect = document.createElementNS(ns, 'rect');
    waterRect.setAttribute('x', '4');
    waterRect.setAttribute('y', '16');
    waterRect.setAttribute('width', '34');
    waterRect.setAttribute('height', '46');
    waterRect.setAttribute('fill', 'var(--water)');
    waterGroup.appendChild(waterRect);

    // Wavy top edge on the water, looping horizontally for a gentle ripple
    const wave = document.createElementNS(ns, 'path');
    wave.setAttribute('d', 'M-10 16 Q -2 11 6 16 T 22 16 T 38 16 T 54 16 V 24 H -10 Z');
    wave.setAttribute('fill', 'var(--water-light)');
    wave.setAttribute('class', filled ? 'wave-path' : '');
    waterGroup.appendChild(wave);

    svg.appendChild(waterGroup);

    // Glass outline drawn on top so the water appears "inside" it
    const outline = document.createElementNS(ns, 'path');
    outline.setAttribute('d', 'M6 4 L36 4 L31 58 L11 58 Z');
    outline.setAttribute('class', 'glass-outline');
    svg.appendChild(outline);

    return svg;
  }

  function spawnDrop(dropLayer) {
    const drop = document.createElement('div');
    drop.className = 'drop falling';
    dropLayer.appendChild(drop);
    setTimeout(() => drop.remove(), 550);
  }

  function spawnSplash(slot) {
    const ring = document.createElement('div');
    ring.className = 'splash-ring play';
    slot.appendChild(ring);
    setTimeout(() => ring.remove(), 550);
  }

  function renderWater() {
    const waterRow = document.getElementById('water-row');
    waterRow.innerHTML = '';
    for (let i = 0; i < WATER_TARGET; i++) {
      const slot = document.createElement('div');
      slot.className = 'glass-slot';

      const dropLayer = document.createElement('div');
      dropLayer.className = 'drop-layer';
      slot.appendChild(dropLayer);

      const filled = i < state.water.count;
      const svg = buildGlassSVG(filled);
      slot.appendChild(svg);

      slot.onclick = async () => {
        const filling = i + 1 > state.water.count;
        // Pour a drop in when filling this glass; just re-render (no drop) when emptying back down to it
        if (filling) {
          spawnDrop(dropLayer);
          setTimeout(() => spawnSplash(slot), 420);
        }
        state.water.count = filling ? i + 1 : i;
        state.water.date = todayKey();
        await storeSet('water', state.water);
        render();
      };

      waterRow.appendChild(slot);
    }
    const summary = document.getElementById('water-summary');
    summary.textContent = state.water.count + ' / ' + WATER_TARGET + ' glasses' +
      (state.water.count >= WATER_TARGET ? '  — goal reached 🎉' : '');
  }

  function wireStaticControls() {
    document.getElementById('todo-add-btn').onclick = () => addItem('todos', 'todo-input');
    document.getElementById('todo-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('todos', 'todo-input'); });
    document.getElementById('shopping-add-btn').onclick = () => addItem('shopping', 'shopping-input');
    document.getElementById('shopping-input').addEventListener('keydown', e => { if (e.key === 'Enter') addItem('shopping', 'shopping-input'); });
  }

  async function addItem(stateKey, inputId) {
    const input = document.getElementById(inputId);
    const text = input.value.trim();
    if (!text) return;
    state[stateKey].push({ id: uid(), text, done: false, dateAdded: todayKey() });
    input.value = '';
    await storeSet(stateKey, state[stateKey]);
    render();
  }

  async function init() {
    await loadState();
    const changed = rolloverIfNewDay();
    if (changed) await saveAll();
    wireStaticControls();
    render();

    setInterval(async () => {
      if (rolloverIfNewDay()) {
        await saveAll();
        render();
      }
    }, 60 * 1000);
  }

  init();
})();
</script>
